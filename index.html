<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Game da Contabilidade</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans antialiased overflow-x-hidden bg-black">

  <div id="tela-inicio" class="min-h-screen bg-gradient-to-br from-blue-950 via-indigo-900 to-purple-900 flex items-center justify-center p-4 text-white">
    <div class="max-w-3xl w-full bg-black/30 border-2 sm:border-4 border-yellow-400 rounded-[28px] sm:rounded-[40px] p-5 sm:p-10 shadow-2xl text-center backdrop-blur-md">
      <h1 class="text-3xl sm:text-5xl md:text-6xl font-black text-yellow-300 mb-4 leading-tight">
        🎮 GAME DA CONTABILIDADE
      </h1>

      <p class="text-base sm:text-xl md:text-2xl mb-8">
        Complete o desafio e se torne um Mestre da Contabilidade!
      </p>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 text-sm sm:text-base md:text-lg">
        <div class="bg-green-500/20 p-4 rounded-3xl border-2 border-green-400">
          ⭐ 10 Perguntas
        </div>

        <div class="bg-blue-500/20 p-4 rounded-3xl border-2 border-blue-400">
          ❤️ 3 Vidas
        </div>

        <div class="bg-yellow-500/20 p-4 rounded-3xl border-2 border-yellow-400">
          🏆 Sistema de Pontos
        </div>
      </div>

      <button onclick="iniciarJogo()" class="w-full sm:w-auto bg-yellow-400 active:scale-95 transition-all text-black text-lg sm:text-2xl font-bold px-8 py-4 rounded-3xl shadow-xl">
        ▶ COMEÇAR JOGO
      </button>
    </div>
  </div>

  <div id="tela-jogo" class="hidden min-h-screen bg-gradient-to-br from-blue-900 via-indigo-900 to-purple-950 flex items-center justify-center p-3 sm:p-6 text-white">
    <div class="max-w-4xl w-full bg-black/30 border-2 sm:border-4 border-yellow-400 rounded-[28px] sm:rounded-[40px] p-4 sm:p-8 shadow-2xl backdrop-blur-md">

      <div class="flex flex-col sm:flex-row gap-3 sm:gap-0 justify-between items-center mb-6">
        <div id="pontos-display" class="text-lg sm:text-2xl font-bold text-center">
          ⭐ Pontos: 0
        </div>

        <div id="vidas-display" class="text-lg sm:text-2xl font-bold text-center">
          ❤️ Vidas: 3
        </div>
      </div>

      <div class="bg-white text-black rounded-[24px] sm:rounded-[30px] p-5 sm:p-8 shadow-xl">

        <p id="contador-pergunta" class="text-sm sm:text-lg font-bold text-gray-500 mb-4">
          Pergunta 1 de 10
        </p>

        <h2 id="texto-pergunta" class="text-2xl sm:text-3xl md:text-4xl font-black mb-8 leading-snug break-words"></h2>

        <div id="opcoes-container" class="grid gap-4"></div>

        <div id="resultado-texto" class="mt-8 text-center text-lg sm:text-2xl font-bold hidden"></div>

        <div id="proxima-container" class="text-center mt-8 hidden">
          <button onclick="proxima()" class="w-full sm:w-auto bg-purple-700 text-white px-8 py-4 rounded-3xl text-lg sm:text-2xl font-bold active:scale-95 transition-all">
            Próxima Pergunta ▶
          </button>
        </div>

      </div>
    </div>
  </div>

  <div id="tela-fim" class="hidden min-h-screen bg-gradient-to-br from-yellow-300 to-orange-500 flex items-center justify-center p-4">
    <div class="bg-white rounded-[28px] sm:rounded-[40px] p-6 sm:p-10 max-w-2xl w-full text-center shadow-2xl border-2 sm:border-4 border-yellow-500">

      <h1 class="text-4xl sm:text-5xl md:text-6xl font-black text-yellow-600 mb-6 leading-tight">
        🏆 PARABÉNS!
      </h1>

      <p id="pontuacao-final" class="text-2xl sm:text-3xl font-bold mb-4">
        Você fez 0 pontos!
      </p>

      <p class="text-base sm:text-xl mb-8">
        Você completou o desafio dos princípios da contabilidade.
      </p>

      <div class="text-5xl sm:text-7xl mb-6">
        🎖️
      </div>

      <button onclick="window.location.reload()" class="w-full sm:w-auto bg-purple-700 text-white px-8 py-4 rounded-3xl text-lg sm:text-2xl font-bold active:scale-95 transition-all">
        🔄 JOGAR NOVAMENTE
      </button>

    </div>
  </div>

  <script>
    const perguntas = [
      {
        pergunta: "O princípio da Entidade significa:",
        opcoes: [
          "Misturar dinheiro pessoal com o da empresa",
          "Separar o patrimônio da empresa do dono",
          "Registrar apenas lucros"
        ],
        correta: 1
      },
      {
        pergunta: "A Continuidade considera que:",
        opcoes: [
          "A empresa continuará funcionando",
          "A empresa fechará amanhã",
          "A empresa não precisa de controle"
        ],
        correta: 0
      },
      {
        pergunta: "A Competência determina que:",
        opcoes: [
          "Receitas e despesas entram no período correto",
          "Só registra quando paga",
          "Despesas não importam"
        ],
        correta: 0
      },
      {
        pergunta: "Prudência significa:",
        opcoes: [
          "Exagerar lucros",
          "Ignorar riscos",
          "Evitar exageros financeiros"
        ],
        correta: 2
      },
      {
        pergunta: "Usar dinheiro da empresa para contas pessoais:",
        opcoes: [
          "Está correto",
          "Fere o princípio da Entidade",
          "É obrigatório"
        ],
        correta: 1
      },
      {
        pergunta: "Patrimônio é formado por:",
        opcoes: [
          "Bens, direitos e obrigações",
          "Somente dinheiro",
          "Somente dívidas"
        ],
        correta: 0
      },
      {
        pergunta: "A contabilidade ajuda:",
        opcoes: [
          "Na tomada de decisões",
          "Somente em impostos",
          "Não serve para empresas"
        ],
        correta: 0
      },
      {
        pergunta: "Receita recebida depois deve:",
        opcoes: [
          "Ser ignorada",
          "Ser registrada corretamente",
          "Entrar como prejuízo"
        ],
        correta: 1
      },
      {
        pergunta: "O princípio do Registro pelo Valor Original determina que:",
        opcoes: [
          "Os bens devem ser registrados pelo valor de compra",
          "Os bens podem ter qualquer valor",
          "Os bens devem ser registrados apenas quando vendidos"
        ],
        correta: 0
      },
      {
        pergunta: "O princípio da Oportunidade exige:",
        opcoes: [
          "Registrar informações no momento correto",
          "Registrar apenas lucros",
          "Ignorar pequenas despesas"
        ],
        correta: 0
      }
    ];

    let indice = 0;
    let pontos = 0;
    let vidas = 3;
    let respondido = false;

    const telaInicio = document.getElementById("tela-inicio");
    const telaJogo = document.getElementById("tela-jogo");
    const telaFim = document.getElementById("tela-fim");

    const pontosDisplay = document.getElementById("pontos-display");
    const vidasDisplay = document.getElementById("vidas-display");
    const contadorPergunta = document.getElementById("contador-pergunta");
    const textoPergunta = document.getElementById("texto-pergunta");
    const opcoesContainer = document.getElementById("opcoes-container");
    const resultadoTexto = document.getElementById("resultado-texto");
    const proximaContainer = document.getElementById("proxima-container");
    const pontuacaoFinal = document.getElementById("pontuacao-final");

    function iniciarJogo() {
      telaInicio.classList.add("hidden");
      telaJogo.classList.remove("hidden");
      renderizarPergunta();
    }

    function renderizarPergunta() {
      respondido = false;

      resultadoTexto.classList.add("hidden");
      proximaContainer.classList.add("hidden");

      contadorPergunta.textContent = `Pergunta ${indice + 1} de ${perguntas.length}`;
      textoPergunta.textContent = perguntas[indice].pergunta;

      pontosDisplay.textContent = `⭐ Pontos: ${pontos}`;
      vidasDisplay.textContent = `❤️ Vidas: ${vidas}`;

      opcoesContainer.innerHTML = "";

      perguntas[indice].opcoes.forEach((opcao, i) => {
        const button = document.createElement("button");

        button.textContent = opcao;

        button.className =
          "w-full bg-gradient-to-r from-yellow-300 to-orange-400 text-black text-base sm:text-xl font-bold p-4 sm:p-5 rounded-3xl active:scale-95 transition-all shadow-lg leading-snug break-words";

        button.onclick = () => responder(i);

        opcoesContainer.appendChild(button);
      });
    }

    function responder(alternativaEscolhida) {
      if (respondido) return;

      respondido = true;

      const correta = perguntas[indice].correta;

      if (alternativaEscolhida === correta) {
        pontos += 10;

        pontosDisplay.textContent = `⭐ Pontos: ${pontos}`;

        resultadoTexto.textContent = "🎉 Resposta correta! +10 pontos";

        resultadoTexto.className =
          "mt-8 text-center text-lg sm:text-2xl font-bold text-green-600";
      } else {
        vidas -= 1;

        vidasDisplay.textContent = `❤️ Vidas: ${vidas}`;

        resultadoTexto.textContent =
          "❌ Resposta errada! Você perdeu 1 vida";

        resultadoTexto.className =
          "mt-8 text-center text-lg sm:text-2xl font-bold text-red-600";
      }

      resultadoTexto.classList.remove("hidden");
      proximaContainer.classList.remove("hidden");
    }

    function proxima() {
      if (vidas <= 0) {
        finalizarJogo();
        return;
      }

      if (indice + 1 < perguntas.length) {
        indice++;
        renderizarPergunta();
      } else {
        finalizarJogo();
      }
    }

    function finalizarJogo() {
      telaJogo.classList.add("hidden");

      telaFim.classList.remove("hidden");

      pontuacaoFinal.textContent = `Você fez ${pontos} pontos!`;

      if (vidas <= 0) {
        document.querySelector("#tela-fim h1").textContent =
          "❌ GAME OVER";

        document.querySelector("#tela-fim h1").className =
          "text-4xl sm:text-5xl md:text-6xl font-black text-red-600 mb-6 leading-tight";

        document.querySelector("#tela-fim p:nth-of-type(2)").textContent =
          "Você perdeu todas as suas vidas.";
      }
    }
  </script>
</body>
</html>
